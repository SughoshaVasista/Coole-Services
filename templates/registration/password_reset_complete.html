{% extends 'base.html' %}

{% block title %}Password Reset Complete - Cool-E{% endblock %}

{% block content %}
<div class="container" style="padding: 4rem 1rem; display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 2.5rem; text-align: center;">
        <div style="font-size: 4rem; margin-bottom: 1.5rem;">✅</div>
        <h2 class="text-primary" style="font-weight: 700; margin-bottom: 1rem;">Password reset complete!</h2>
        <p class="text-secondary" style="font-size: 1.05rem; line-height: 1.6; margin-bottom: 2rem;">
            Your password has been set. You may go ahead and log in now.
        </p>
        
        <div class="mt-4">
            <a href="{% url 'login' %}" class="btn btn-primary" style="width: 100%; padding: 1.2rem; font-weight: 600; font-size: 1rem; border-radius: 12px; text-decoration: none;">
                Sign In Now
            </a>
        </div>
    </div>
</div>
{% endblock %}
