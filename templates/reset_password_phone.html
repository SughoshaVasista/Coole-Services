{% extends 'base.html' %}

{% block title %}Set New Password - Cool-E{% endblock %}

{% block content %}
<div class="container" style="padding: 4rem 1rem; display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 2.5rem;">
        <div class="text-center mb-4">
            <h2 class="text-primary" style="font-weight: 700;">Reset Password</h2>
            <p class="text-secondary" style="font-size: 0.95rem;">Setting new password for <strong>{{ reset_user.username }}</strong></p>
        </div>

        <form method="post">
            {% csrf_token %}
            
            <div style="margin-bottom: 1.5rem;">
                <label for="id_password" class="form-label" style="display: block; margin-bottom: 0.8rem; color: #fff; font-weight: 500;">New Password</label>
                <input type="password" name="password" id="id_password" class="form-control" required 
                       style="width: 100%; padding: 1rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff;">
            </div>

            <div style="margin-bottom: 2rem;">
                <label for="id_confirm_password" class="form-label" style="display: block; margin-bottom: 0.8rem; color: #fff; font-weight: 500;">Confirm New Password</label>
                <input type="password" name="confirm_password" id="id_confirm_password" class="form-control" required 
                       style="width: 100%; padding: 1rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff;">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.2rem; font-weight: 600; font-size: 1rem; border-radius: 12px;">
                Reset Password
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{% url 'forgot_password' %}" class="text-secondary" style="text-decoration: none; font-size: 0.9rem;">
                ← Go back
            </a>
        </div>
    </div>
</div>
{% endblock %}
