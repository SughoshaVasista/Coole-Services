{% extends "base.html" %}

{% block title %}Checkout - Razorpay{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-lg">
                <div class="card-header bg-primary text-white text-center">
                    <h3>Complete Your Payment</h3>
                </div>
                <div class="card-body p-4 text-center">
                    <p class="lead">Booking for <strong>{{ booking.provider.user.username }}</strong></p>
                    <p class="h4 mb-4">Amount: <span class="text-success">₹{{ booking.provider.price_per_hour }}</span></p>
                    
                    <button id="rzp-button1" class="btn btn-primary btn-lg btn-block">
                        <i class="fas fa-credit-card mr-2"></i> Pay with Razorpay / UPI
                    </button>
                </div>
                <div class="card-footer text-muted text-center">
                    Secure payment powered by Razorpay
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
var options = {
    "key": "{{ razorpay_merchant_key }}", // Enter the Key ID generated from the Dashboard
    "amount": "{{ amount }}", // Amount is in currency subunits. Default currency is INR. Hence, 50000 refers to 50000 paise
    "currency": "{{ currency }}",
    "name": "Cool-E Services",
    "description": "Payment for Booking #{{ booking.id }}",
    "image": "https://example.com/your_logo",
    "order_id": "{{ razorpay_order_id }}", //This is a sample Order ID. Pass the `id` obtained in the response of Step 1
    "callback_url": "{{ callback_url }}",
    "prefill": {
        "name": "{{ booking.user.get_full_name }}",
        "email": "{{ booking.user.email }}",
        "contact": ""
    },
    "notes": {
        "address": "Razorpay Corporate Office"
    },
    "theme": {
        "color": "#3399cc"
    }
};
var rzp1 = new Razorpay(options);
document.getElementById('rzp-button1').onclick = function(e){
    rzp1.open();
    e.preventDefault();
}
</script>
{% endblock %}
