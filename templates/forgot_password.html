{% extends 'base.html' %}

{% block title %}Reset Password - Cool-E{% endblock %}

{% block content %}
<div class="container" style="padding: 4rem 1rem; display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 2.5rem;">
        <div class="text-center mb-4">
            <h2 class="text-primary" style="font-weight: 700;">Forgot Password?</h2>
            <p class="text-secondary" style="font-size: 0.95rem;">Enter your registered Phone Number to reset your password.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            
            <div style="margin-bottom: 2rem;">
                <label for="id_phone" class="form-label" style="display: block; margin-bottom: 0.8rem; color: #fff; font-weight: 500;">Phone Number</label>
                <input type="text" name="phone" id="id_phone" class="form-control" required 
                       style="width: 100%; padding: 1rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff;"
                       placeholder="e.g. 9876543210">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.2rem; font-weight: 600; font-size: 1rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 230, 118, 0.2);">
                Find Account
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{% url 'login' %}" class="text-secondary" style="text-decoration: none; font-size: 0.9rem;">
                ← Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
